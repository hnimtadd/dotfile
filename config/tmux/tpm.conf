# ==========================================================
# MINIMAL HARDCODED-FEEL TPM CONFIG
# ==========================================================

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# ==========================================================
# BASIC STATUS BAR - NO FANCY STYLING
# ==========================================================

# Position status bar at the bottom
set -g status-position bottom

# Colors: simple black and white/grey theme
set -g status-style 'bg=black fg=white'
set -g status-left-style 'bg=black fg=white'
set -g status-right-style 'bg=black fg=white'

# Window status colors
set -g window-status-style 'bg=black fg=white'
set -g window-status-current-style 'bg=white fg=black'

# Pane border
set -g pane-border-style 'fg=white'
set -g pane-active-border-style 'fg=white'

# Message text
set -g message-style 'bg=black fg=white'

# Status bar layout
set -g status-left-length 30
set -g status-right-length 60
set -g status-justify left

# Left: [session] 
set -g status-left '[#S] '

# Center: window list (default behavior)
set -g window-status-format ' #I:#W '
set -g window-status-current-format ' #I:#W '

# Right: hostname | %Y-%m-%d %H:%M
set -g status-right '#H | %Y-%m-%d %H:%M'

# Initialize TMUX plugin manager
run 'tpack init'
